<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asteroids</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; width: 100vw; height: 100vh; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// ── Constants ──────────────────────────────────────────────────────────────
const SHIP_SIZE = 18;
const SHIP_THRUST = 220;
const SHIP_REVERSE_THRUST = 100;
const SHIP_ROTATE_SPEED = 3.2;
const SHIP_DRAG = 0.97;
const INVINCIBLE_DURATION = 3000; // ms
const BULLET_SPEED = 520;
const BULLET_LIFETIME = 1400; // ms
const AUTO_FIRE_INTERVAL = 220; // ms between shots
const ASTEROID_SIZES = { large: 48, medium: 26, small: 13 };
const ASTEROID_SPEED = { large: 55, medium: 90, small: 140 };
const ASTEROID_POINTS = { large: 20, medium: 50, small: 100 };
const INITIAL_ASTEROIDS = 5;

// ── Input ──────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (gameState === 'start' || gameState === 'gameover') startGame();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

// ── Game State ─────────────────────────────────────────────────────────────
let gameState = 'start'; // 'start' | 'playing' | 'gameover'
let score = 0;
let lives = 3;
let ship, bullets, asteroids, particles;
let lastTime = 0;
let lastFireTime = 0;
let invincibleUntil = 0;

function startGame() {
  gameState = 'playing';
  score = 0;
  lives = 3;
  bullets = [];
  particles = [];
  invincibleUntil = 0;
  lastFireTime = 0;
  ship = createShip();
  asteroids = [];
  for (let i = 0; i < INITIAL_ASTEROIDS; i++) spawnAsteroid();
}

// ── Ship ───────────────────────────────────────────────────────────────────
function createShip() {
  return {
    x: canvas.width / 2,
    y: canvas.height / 2,
    vx: 0,
    vy: 0,
    angle: -Math.PI / 2, // pointing up
  };
}

function resetShip() {
  ship.x = canvas.width / 2;
  ship.y = canvas.height / 2;
  ship.vx = 0;
  ship.vy = 0;
  ship.angle = -Math.PI / 2;
  invincibleUntil = performance.now() + INVINCIBLE_DURATION;
}

function updateShip(dt, now) {
  // Rotation
  if (keys['ArrowLeft'])  ship.angle -= SHIP_ROTATE_SPEED * dt;
  if (keys['ArrowRight']) ship.angle += SHIP_ROTATE_SPEED * dt;

  // Thrust
  if (keys['w'] || keys['W']) {
    ship.vx += Math.cos(ship.angle) * SHIP_THRUST * dt;
    ship.vy += Math.sin(ship.angle) * SHIP_THRUST * dt;
  }
  if (keys['s'] || keys['S']) {
    ship.vx -= Math.cos(ship.angle) * SHIP_REVERSE_THRUST * dt;
    ship.vy -= Math.sin(ship.angle) * SHIP_REVERSE_THRUST * dt;
  }

  // Drag
  ship.vx *= Math.pow(SHIP_DRAG, dt * 60);
  ship.vy *= Math.pow(SHIP_DRAG, dt * 60);

  ship.x += ship.vx * dt;
  ship.y += ship.vy * dt;

  // Wrap
  ship.x = wrap(ship.x, canvas.width);
  ship.y = wrap(ship.y, canvas.height);

  // Auto fire
  if (now - lastFireTime >= AUTO_FIRE_INTERVAL) {
    fireBullet(now);
    lastFireTime = now;
  }
}

function drawShip(now) {
  const inv = invincibleUntil > now;
  // Flicker during invincibility
  if (inv && Math.floor(now / 120) % 2 === 0) return;

  ctx.save();
  ctx.translate(ship.x, ship.y);
  ctx.rotate(ship.angle);

  // Thruster flame
  if (keys['w'] || keys['W']) {
    ctx.beginPath();
    const flameLen = SHIP_SIZE * (0.9 + Math.random() * 0.5);
    ctx.moveTo(-SHIP_SIZE * 0.5,  SHIP_SIZE * 0.45);
    ctx.lineTo(-SHIP_SIZE - flameLen, 0);
    ctx.lineTo(-SHIP_SIZE * 0.5, -SHIP_SIZE * 0.45);
    ctx.strokeStyle = `hsl(${30 + Math.random() * 30}, 100%, 65%)`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Ship body
  ctx.beginPath();
  ctx.moveTo(SHIP_SIZE, 0);
  ctx.lineTo(-SHIP_SIZE * 0.6,  SHIP_SIZE * 0.55);
  ctx.lineTo(-SHIP_SIZE * 0.35, 0);
  ctx.lineTo(-SHIP_SIZE * 0.6, -SHIP_SIZE * 0.55);
  ctx.closePath();
  ctx.strokeStyle = '#0ff';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.restore();
}

// ── Bullets ────────────────────────────────────────────────────────────────
function fireBullet(now) {
  bullets.push({
    x: ship.x + Math.cos(ship.angle) * SHIP_SIZE,
    y: ship.y + Math.sin(ship.angle) * SHIP_SIZE,
    vx: Math.cos(ship.angle) * BULLET_SPEED + ship.vx,
    vy: Math.sin(ship.angle) * BULLET_SPEED + ship.vy,
    born: now,
  });
}

function updateBullets(dt, now) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.x = wrap(b.x, canvas.width);
    b.y = wrap(b.y, canvas.height);
    if (now - b.born > BULLET_LIFETIME) bullets.splice(i, 1);
  }
}

function drawBullets() {
  ctx.fillStyle = '#0ff';
  for (const b of bullets) {
    ctx.beginPath();
    ctx.arc(b.x, b.y, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ── Asteroids ──────────────────────────────────────────────────────────────
function makeAsteroidVerts(radius) {
  const count = 9 + Math.floor(Math.random() * 4);
  const verts = [];
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2;
    const r = radius * (0.72 + Math.random() * 0.28);
    verts.push({ x: Math.cos(angle) * r, y: Math.sin(angle) * r });
  }
  return verts;
}

function spawnAsteroid(x, y, size) {
  size = size || 'large';
  const radius = ASTEROID_SIZES[size];
  let ax, ay;
  if (x !== undefined && y !== undefined) {
    ax = x; ay = y;
  } else {
    // Spawn away from ship center
    do {
      ax = Math.random() * canvas.width;
      ay = Math.random() * canvas.height;
    } while (dist(ax, ay, canvas.width / 2, canvas.height / 2) < 150);
  }
  const speed = ASTEROID_SPEED[size] * (0.6 + Math.random() * 0.8);
  const dir = Math.random() * Math.PI * 2;
  asteroids.push({
    x: ax, y: ay,
    vx: Math.cos(dir) * speed,
    vy: Math.sin(dir) * speed,
    angle: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 1.8,
    size,
    radius,
    verts: makeAsteroidVerts(radius),
  });
}

function updateAsteroids(dt) {
  for (const a of asteroids) {
    a.x += a.vx * dt;
    a.y += a.vy * dt;
    a.angle += a.rotSpeed * dt;
    a.x = wrap(a.x, canvas.width);
    a.y = wrap(a.y, canvas.height);
  }
}

function drawAsteroids() {
  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = 2;
  for (const a of asteroids) {
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.rotate(a.angle);
    ctx.beginPath();
    ctx.moveTo(a.verts[0].x, a.verts[0].y);
    for (let i = 1; i < a.verts.length; i++) ctx.lineTo(a.verts[i].x, a.verts[i].y);
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }
}

function splitAsteroid(asteroid, index) {
  const nextSize = asteroid.size === 'large' ? 'medium' : 'small';
  const count = 2 + Math.floor(Math.random() * 2); // 2 or 3
  for (let i = 0; i < count; i++) {
    spawnAsteroid(asteroid.x, asteroid.y, nextSize);
  }
  spawnExplosion(asteroid.x, asteroid.y, asteroid.size);
  score += ASTEROID_POINTS[asteroid.size];
  asteroids.splice(index, 1);
}

// ── Particles ──────────────────────────────────────────────────────────────
function spawnExplosion(x, y, size) {
  const count = size === 'large' ? 18 : size === 'medium' ? 12 : 7;
  for (let i = 0; i < count; i++) {
    const speed = 40 + Math.random() * 140;
    const dir = Math.random() * Math.PI * 2;
    particles.push({
      x, y,
      vx: Math.cos(dir) * speed,
      vy: Math.sin(dir) * speed,
      life: 1.0,
      decay: 0.6 + Math.random() * 0.8,
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= p.decay * dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = `hsl(${30 + p.life * 30}, 100%, 65%)`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ── Collision Detection ────────────────────────────────────────────────────
function checkCollisions(now) {
  // Bullets vs asteroids
  outer:
  for (let bi = bullets.length - 1; bi >= 0; bi--) {
    for (let ai = asteroids.length - 1; ai >= 0; ai--) {
      if (dist(bullets[bi].x, bullets[bi].y, asteroids[ai].x, asteroids[ai].y) < asteroids[ai].radius) {
        bullets.splice(bi, 1);
        if (asteroids[ai].size === 'small') {
          spawnExplosion(asteroids[ai].x, asteroids[ai].y, 'small');
          score += ASTEROID_POINTS.small;
          asteroids.splice(ai, 1);
        } else {
          splitAsteroid(asteroids[ai], ai);
        }
        continue outer;
      }
    }
  }

  // Ship vs asteroids
  if (invincibleUntil > now) return;
  for (let ai = asteroids.length - 1; ai >= 0; ai--) {
    if (dist(ship.x, ship.y, asteroids[ai].x, asteroids[ai].y) < asteroids[ai].radius * 0.8 + SHIP_SIZE * 0.5) {
      lives--;
      spawnExplosion(ship.x, ship.y, 'large');
      if (lives <= 0) {
        gameState = 'gameover';
      } else {
        resetShip();
      }
      break;
    }
  }
}

// ── Wave Management ────────────────────────────────────────────────────────
function checkWave() {
  if (asteroids.length === 0) {
    const count = INITIAL_ASTEROIDS + Math.floor(score / 500);
    for (let i = 0; i < Math.min(count, 12); i++) spawnAsteroid();
  }
}

// ── HUD ────────────────────────────────────────────────────────────────────
function drawHUD() {
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px "Courier New", monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`SCORE  ${score}`, 24, 40);

  // Lives as ship icons
  ctx.textAlign = 'right';
  for (let i = 0; i < lives; i++) {
    const lx = canvas.width - 24 - i * 32;
    const ly = 28;
    ctx.save();
    ctx.translate(lx, ly);
    ctx.rotate(-Math.PI / 2);
    ctx.beginPath();
    ctx.moveTo(10, 0);
    ctx.lineTo(-6, 6);
    ctx.lineTo(-4, 0);
    ctx.lineTo(-6, -6);
    ctx.closePath();
    ctx.strokeStyle = '#0ff';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.restore();
  }
}

function drawStartScreen() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.font = 'bold 64px "Courier New", monospace';
  ctx.fillText('ASTEROIDS', canvas.width / 2, canvas.height / 2 - 80);

  ctx.font = '20px "Courier New", monospace';
  ctx.fillStyle = '#aaa';
  ctx.fillText('← → ROTATE      W / S THRUST', canvas.width / 2, canvas.height / 2);
  ctx.fillText('AUTO-FIRE ENABLED', canvas.width / 2, canvas.height / 2 + 36);

  ctx.fillStyle = '#0ff';
  ctx.font = 'bold 24px "Courier New", monospace';
  const blink = Math.floor(performance.now() / 600) % 2 === 0;
  if (blink) ctx.fillText('PRESS ANY KEY TO START', canvas.width / 2, canvas.height / 2 + 100);
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#f44';
  ctx.font = 'bold 64px "Courier New", monospace';
  ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 60);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 30px "Courier New", monospace';
  ctx.fillText(`FINAL SCORE: ${score}`, canvas.width / 2, canvas.height / 2 + 10);

  ctx.fillStyle = '#0ff';
  ctx.font = 'bold 22px "Courier New", monospace';
  const blink = Math.floor(performance.now() / 600) % 2 === 0;
  if (blink) ctx.fillText('PRESS ANY KEY TO PLAY AGAIN', canvas.width / 2, canvas.height / 2 + 70);
}

// ── Helpers ────────────────────────────────────────────────────────────────
function wrap(val, max) {
  if (val < 0) return val + max;
  if (val > max) return val - max;
  return val;
}

function dist(x1, y1, x2, y2) {
  return Math.hypot(x2 - x1, y2 - y1);
}

// ── Main Loop ──────────────────────────────────────────────────────────────
function loop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (gameState === 'start') {
    drawStartScreen();
  } else if (gameState === 'playing') {
    updateShip(dt, timestamp);
    updateBullets(dt, timestamp);
    updateAsteroids(dt);
    updateParticles(dt);
    checkCollisions(timestamp);
    checkWave();

    drawAsteroids();
    drawBullets();
    drawShip(timestamp);
    drawParticles();
    drawHUD();
  } else if (gameState === 'gameover') {
    // Still draw the field
    updateParticles(dt);
    drawAsteroids();
    drawBullets();
    drawParticles();
    drawHUD();
    drawGameOver();
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(loop); });
</script>
</body>
</html>
