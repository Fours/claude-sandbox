<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breakout</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      display: block;
      border: 1px solid #222;
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  const W = 480;
  const H = 640;
  canvas.width = W;
  canvas.height = H;

  // ── Constants ──────────────────────────────────────────────
  const PADDLE_W = 80;
  const PADDLE_H = 12;
  const PADDLE_Y = H - 50;
  const PADDLE_SPEED = 6;

  const BALL_R = 7;
  const BALL_BASE_SPEED = 4.5;

  const BRICK_COLS = 8;
  const BRICK_ROWS = 5;
  const BRICK_W = 48;
  const BRICK_H = 18;
  const BRICK_PAD = 6;
  const BRICK_OFFSET_X = (W - (BRICK_COLS * (BRICK_W + BRICK_PAD) - BRICK_PAD)) / 2;
  const BRICK_OFFSET_Y = 70;

  const ROW_COLORS = [
    '#ff4d6d', // red
    '#ff944d', // orange
    '#ffd84d', // yellow
    '#4dff91', // green
    '#4db8ff', // blue
  ];

  const LIVES_START = 3;

  // ── State ──────────────────────────────────────────────────
  let paddle, ball, bricks, score, lives, state, keys;
  // state: 'ready' | 'playing' | 'dead' | 'win' | 'gameover'

  function initGame() {
    paddle = { x: W / 2 - PADDLE_W / 2, y: PADDLE_Y, w: PADDLE_W, h: PADDLE_H };

    const angle = (Math.random() * 60 - 30) * Math.PI / 180; // -30..+30 deg from straight up
    ball = {
      x: W / 2,
      y: PADDLE_Y - BALL_R - 2,
      vx: Math.sin(angle) * BALL_BASE_SPEED,
      vy: -Math.cos(angle) * BALL_BASE_SPEED,
      speed: BALL_BASE_SPEED,
    };

    bricks = [];
    for (let r = 0; r < BRICK_ROWS; r++) {
      for (let c = 0; c < BRICK_COLS; c++) {
        bricks.push({
          x: BRICK_OFFSET_X + c * (BRICK_W + BRICK_PAD),
          y: BRICK_OFFSET_Y + r * (BRICK_H + BRICK_PAD),
          w: BRICK_W,
          h: BRICK_H,
          color: ROW_COLORS[r],
          alive: true,
          opacity: 1,
          dissolving: false,
        });
      }
    }

    score = 0;
    lives = LIVES_START;
    state = 'ready';
    keys = { left: false, right: false };
  }

  function resetBall() {
    const angle = (Math.random() * 60 - 30) * Math.PI / 180;
    ball.x = paddle.x + paddle.w / 2;
    ball.y = PADDLE_Y - BALL_R - 2;
    ball.vx = Math.sin(angle) * ball.speed;
    ball.vy = -Math.cos(angle) * ball.speed;
    state = 'ready';
  }

  // ── Input ──────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  keys.left  = true;
    if (e.key === 'ArrowRight') keys.right = true;
    if (e.key === ' ') {
      e.preventDefault();
      if (state === 'ready')   state = 'playing';
      else if (state === 'win' || state === 'gameover') initGame();
    }
  });
  document.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft')  keys.left  = false;
    if (e.key === 'ArrowRight') keys.right = false;
  });

  // ── Collision helpers ──────────────────────────────────────
  function rectCircleCollide(rx, ry, rw, rh, cx, cy, cr) {
    const nearX = Math.max(rx, Math.min(cx, rx + rw));
    const nearY = Math.max(ry, Math.min(cy, ry + rh));
    const dx = cx - nearX;
    const dy = cy - nearY;
    return dx * dx + dy * dy <= cr * cr;
  }

  function resolveCircleRect(rx, ry, rw, rh, cx, cy, cr) {
    // Returns which axis to bounce: 'x', 'y', or 'both'
    const overlapLeft   = (cx + cr) - rx;
    const overlapRight  = (rx + rw) - (cx - cr);
    const overlapTop    = (cy + cr) - ry;
    const overlapBottom = (ry + rh) - (cy - cr);
    const minOverlapX = Math.min(overlapLeft, overlapRight);
    const minOverlapY = Math.min(overlapTop,  overlapBottom);
    if (minOverlapX < minOverlapY) return 'x';
    if (minOverlapY < minOverlapX) return 'y';
    return 'both';
  }

  // ── Update ─────────────────────────────────────────────────
  function update() {
    // Move paddle
    if (keys.left)  paddle.x = Math.max(0, paddle.x - PADDLE_SPEED);
    if (keys.right) paddle.x = Math.min(W - paddle.w, paddle.x + PADDLE_SPEED);

    if (state === 'ready') {
      // Ball follows paddle center while waiting
      ball.x = paddle.x + paddle.w / 2;
      ball.y = PADDLE_Y - BALL_R - 2;
      return;
    }

    if (state !== 'playing') return;

    // Move ball
    ball.x += ball.vx;
    ball.y += ball.vy;

    // Wall collisions
    if (ball.x - BALL_R <= 0) {
      ball.x = BALL_R;
      ball.vx = Math.abs(ball.vx);
    }
    if (ball.x + BALL_R >= W) {
      ball.x = W - BALL_R;
      ball.vx = -Math.abs(ball.vx);
    }
    if (ball.y - BALL_R <= 0) {
      ball.y = BALL_R;
      ball.vy = Math.abs(ball.vy);
    }

    // Paddle collision
    if (rectCircleCollide(paddle.x, paddle.y, paddle.w, paddle.h, ball.x, ball.y, BALL_R)) {
      ball.vy = -Math.abs(ball.vy);
      // Add spin based on where ball hits paddle
      const hitPos = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2); // -1..1
      ball.vx = hitPos * ball.speed * 1.2;
      // Re-normalise to maintain speed
      const mag = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
      ball.vx = (ball.vx / mag) * ball.speed;
      ball.vy = (ball.vy / mag) * ball.speed;
      ball.y = paddle.y - BALL_R;
    }

    // Ball out of bounds (bottom)
    if (ball.y - BALL_R > H) {
      lives--;
      if (lives <= 0) {
        state = 'gameover';
      } else {
        state = 'dead';
      }
      return;
    }

    // Brick collisions
    let bricksLeft = 0;
    for (const b of bricks) {
      if (!b.alive) continue;
      if (b.dissolving) { bricksLeft++; continue; } // still counts until fully gone

      if (rectCircleCollide(b.x, b.y, b.w, b.h, ball.x, ball.y, BALL_R)) {
        const axis = resolveCircleRect(b.x, b.y, b.w, b.h, ball.x, ball.y, BALL_R);
        if (axis === 'x' || axis === 'both') ball.vx *= -1;
        if (axis === 'y' || axis === 'both') ball.vy *= -1;

        b.dissolving = true;
        score += 10;

        // Speed up ball slightly every 10 bricks
        const bricksHit = (BRICK_COLS * BRICK_ROWS) - bricks.filter(b => b.alive).length + 1;
        if (bricksHit % 10 === 0) {
          ball.speed = Math.min(ball.speed + 0.3, 9);
          const mag = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
          ball.vx = (ball.vx / mag) * ball.speed;
          ball.vy = (ball.vy / mag) * ball.speed;
        }
      }

      if (b.alive) bricksLeft++;
    }

    if (bricksLeft === 0) state = 'win';

    // Dissolve animation
    for (const b of bricks) {
      if (b.dissolving) {
        b.opacity -= 0.06;
        if (b.opacity <= 0) {
          b.opacity = 0;
          b.alive = false;
          b.dissolving = false;
        }
      }
    }
  }

  // ── Draw ───────────────────────────────────────────────────
  function drawBricks() {
    for (const b of bricks) {
      if (!b.alive && !b.dissolving) continue;
      ctx.save();
      ctx.globalAlpha = b.opacity;

      // Brick body
      ctx.fillStyle = b.color;
      ctx.beginPath();
      ctx.roundRect(b.x, b.y, b.w, b.h, 3);
      ctx.fill();

      // Highlight
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.beginPath();
      ctx.roundRect(b.x + 2, b.y + 2, b.w - 4, 5, 2);
      ctx.fill();

      // Dissolve shimmer
      if (b.dissolving) {
        ctx.fillStyle = `rgba(255,255,255,${(1 - b.opacity) * 0.5})`;
        ctx.beginPath();
        ctx.roundRect(b.x, b.y, b.w, b.h, 3);
        ctx.fill();
      }

      ctx.restore();
    }
  }

  function drawPaddle() {
    const grad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.h);
    grad.addColorStop(0, '#a0c4ff');
    grad.addColorStop(1, '#4080cc');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 6);
    ctx.fill();
  }

  function drawBall() {
    // Glow
    const glow = ctx.createRadialGradient(ball.x, ball.y, 0, ball.x, ball.y, BALL_R * 2.5);
    glow.addColorStop(0, 'rgba(255,255,200,0.5)');
    glow.addColorStop(1, 'rgba(255,255,200,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, BALL_R * 2.5, 0, Math.PI * 2);
    ctx.fill();

    // Ball
    const ballGrad = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 1, ball.x, ball.y, BALL_R);
    ballGrad.addColorStop(0, '#fffff0');
    ballGrad.addColorStop(1, '#e0d060');
    ctx.fillStyle = ballGrad;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawHUD() {
    ctx.fillStyle = '#aaa';
    ctx.font = '14px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`SCORE  ${score}`, 12, 22);

    ctx.textAlign = 'right';
    const heartX = W - 12;
    for (let i = 0; i < LIVES_START; i++) {
      ctx.fillStyle = i < lives ? '#ff4d6d' : '#333';
      ctx.font = '16px monospace';
      ctx.fillText('♥', heartX - i * 20, 22);
    }
  }

  function drawOverlay(title, subtitle) {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);

    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 42px monospace';
    ctx.fillText(title, W / 2, H / 2 - 20);

    ctx.fillStyle = '#aaa';
    ctx.font = '16px monospace';
    ctx.fillText(subtitle, W / 2, H / 2 + 20);
  }

  function draw() {
    // Background
    ctx.fillStyle = '#0a0a0f';
    ctx.fillRect(0, 0, W, H);

    // Subtle grid
    ctx.strokeStyle = 'rgba(255,255,255,0.02)';
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 24) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y < H; y += 24) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    drawBricks();
    drawPaddle();
    drawBall();
    drawHUD();

    if (state === 'ready') {
      drawOverlay('BREAKOUT', 'press SPACE to launch');
    } else if (state === 'dead') {
      drawOverlay(`${lives} LIFE${lives !== 1 ? 'S' : ''} LEFT`, 'press SPACE to continue');
      // Auto-advance after a moment when space pressed
    } else if (state === 'win') {
      drawOverlay('YOU WIN!', `score: ${score} — press SPACE to play again`);
    } else if (state === 'gameover') {
      drawOverlay('GAME OVER', `score: ${score} — press SPACE to play again`);
    }
  }

  // ── Game loop ──────────────────────────────────────────────
  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  // Handle 'dead' state space press to reset ball
  document.addEventListener('keydown', e => {
    if (e.key === ' ' && state === 'dead') {
      resetBall();
    }
  });

  initGame();
  loop();
</script>
</body>
</html>
